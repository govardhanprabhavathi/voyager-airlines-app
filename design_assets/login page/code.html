<body class="bg-background text-on-surface flex min-h-screen">
<!-- Left Content: Login Form Canvas -->
<main class="flex-1 flex flex-col justify-center items-center px-6 lg:px-24 py-12 relative z-10">
<!-- Header Brand (From JSON Context) -->
<header class="fixed top-0 left-0 w-full lg:w-1/2 flex justify-between items-center px-8 h-20 z-20">
<div class="font-manrope font-black italic text-blue-800 text-2xl tracking-tight">Voyager</div>
</header>
<div class="w-full max-w-md space-y-8">
<div class="space-y-3">
<h1 class="font-headline font-extrabold text-4xl lg:text-5xl text-primary tracking-tight">Welcome back</h1>
<p class="text-on-surface-variant font-medium">Please enter your details to access your journey.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input Group -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">alternate_email</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 placeholder:text-outline font-medium" id="email" name="email" placeholder="alex@voyager.com" type="email"/>
</div>
</div>
<!-- Password Input Group -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-sm font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200 placeholder:text-outline font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center text-outline cursor-pointer hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</div>
</div>
</div>
<!-- Login CTA -->
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold rounded-xl shadow-lg shadow-primary/10 hover:shadow-primary/25 active:scale-[0.98] transition-all duration-300" type="submit">
                    Sign In
                </button>
</form>
<!-- Social Login Section -->
<div class="space-y-6">
<div class="relative flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-outline text-xs font-bold uppercase tracking-widest">Or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low rounded-xl font-label font-bold text-sm text-on-surface hover:bg-surface-container transition-colors active:scale-95 transition-transform">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google icon on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCLLe8sGy_7-dEl64JqA1Ptq55YRwXdE5tOSkwSx69vDkhurK5XR1z_5SAYTZPKhQxuWG4KFpk7xo-tR5N4nG-UWiij3YeMx1NBGfhxrHun3Q1mwTz7NM-HhDDpj53vd16x9s03AhLzCuRiINgwZpHGIXI8V6kJgiF7aLcBpjS5gLUFk-KXQj1mzD1Cok6yU2H2Oz8zldgtUBE_bym2z5YiIBEWmPMSqK-i41Bo0anuwR_HyjWVHAKtFLCw3JM6EaL-1-WXnQuf-tm-"/>
                        Google

<button class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-low rounded-xl font-label font-bold text-sm text-on-surface hover:bg-surface-container transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[22px] text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
                        Apple
                    </button>
</div>
</div>
<p class="text-center font-label text-sm font-medium text-on-surface-variant">
                Don't have an account? 
                <a class="text-secondary font-bold hover:underline ml-1" href="#">Create account</a>
</p>
</div>

<!-- Right Side: Hero Visual -->

<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>

<div class="absolute bottom-16 right-16 left-16 p-8 backdrop-blur-xl bg-white/10 rounded-3xl border border-white/20 shadow-2xl">
<div class="flex flex-col gap-4">

</div>

</div>
<h2 class="font-headline font-bold text-3xl text-white leading-tight">Elevating your travel from takeoff to landing.</h2>
<div class="flex gap-4 mt-2">

<img alt="User" class="w-8 h-8 rounded-full border-2 border-white/30" data-alt="Portrait of a friendly man wearing casual attire in bright studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAqMse0_22uSigAJcxBeFcjAZQUlL65t6Av0kR3nx8XJPnKlUMPtQsQXN0P_RBfpXTt-xNJF3A4I7ZsbmjQ7edvPC1H2rbTT0Cs3SjiF3Dmfm2Z-2RKwzA4idcbzl9ovRupcx5hSM9BDWr1jVgjSWci_8V9ZQw6VqQ-qA2pNdhg4fOG8Yx_1jFaUZO_P5KBsUlLSUiwAaKK_znht2Y08uajfBn7976fDfI9zWp8IBDBL0f-PdiFVKieu45qW-ZeO7cg6cTC1Et_PVh2"/>

<span class="text-white/80 text-sm font-medium self-center">+ 24k Voyager members</span>
